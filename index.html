<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIプロンプト生成Pro v5.６.4</title>

<style>
:root {
  --bg: #f0f2f5;
  --text: #1c1e21;
  --card: #ffffff;
  --accent: #007aff;
  --border: #ddd;
  --warn-bg: #fff3cd;
  --warn-text: #664d03;
  --warn-border: #ffecb5;
}

body.dark {
  --bg: #18191a;
  --text: #e4e6eb;
  --card: #242526;
  --accent: #3793ff;
  --border: #444;
  --warn-bg: #4a3b00;
  --warn-text: #ffe08a;
  --warn-border: #7a6400;
}

* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, sans-serif;
  padding: 15px;
  max-width: 600px;
  margin: auto;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  font-size: 1.2rem;
  margin-top: 0;
}

h3, h4 {
  margin-bottom: 8px;
}

.tab-container {
  display: flex;
  border-bottom: 2px solid rgba(128,128,128,0.2);
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 0.9rem;
  color: #888;
}

.tab.active {
  border-bottom: 3px solid var(--accent);
  color: var(--accent);
}

label {
  display: block;
  margin-top: 12px;
  font-weight: bold;
  font-size: 0.85rem;
  opacity: 0.9;
}

input, textarea, select {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  margin-top: 5px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--card);
  color: var(--text);
  font-size: 16px;
}

.btn-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 20px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-weight: bold;
  font-size: 0.9rem;
}

.btn-full {
  grid-column: span 2;
}

.btn-secondary {
  background: #606770;
}

button.active-panel {
  background: #ff9500;
  color: white;
}

body.dark button.active-panel {
  background: #ffb340;
  color: #1c1c1c;
}

#output {
  white-space: pre-wrap;
  border: 1px dashed var(--border);
  padding: 15px;
  margin-top: 15px;
  background: rgba(128,128,128,0.05);
  border-radius: 10px;
  font-size: 0.9rem;
  min-height: 80px;
}

.history, .template-item, .danger-item, .pattern-item {
  font-size: 12px;
  border: 1px solid var(--border);
  margin-top: 6px;
  padding: 8px;
  border-radius: 8px;
}

.section-box {
  margin-top: 15px;
}

.small {
  font-size: 12px;
  opacity: 0.8;
}

.history-actions,
.item-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.history-actions button,
.item-actions button {
  padding: 8px 10px;
  font-size: 12px;
}

.warning-box {
  display: none;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  background: var(--warn-bg);
  color: var(--warn-text);
  border: 1px solid var(--warn-border);
  white-space: pre-wrap;
}

.code-like {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11px;
  opacity: 0.9;
  word-break: break-all;
}

.command-box {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.command-chip {
  padding: 7px 9px;
  font-size: 12px;
  border-radius: 999px;
  background: rgba(128,128,128,0.15);
  color: var(--text);
  border: 1px solid var(--border);
  cursor: pointer;
}

.command-chip.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.command-chip:hover {
  background: var(--accent);
  color: white;
}

.preset-box {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.preset-chip {
  padding: 8px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(255,149,0,0.15);
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
}

.preset-chip:hover {
  background: #ff9500;
  color: white;
}

</style>
</head>
<body>

<div class="card">
  <h2>AIプロンプト生成Pro</h2>

  <div class="tab-container">
    <div id="tab1" class="tab active" onclick="switchTab(1)">マニュアル入力</div>
    <div id="tab2" class="tab" onclick="switchTab(2)">ラフから変換</div>
  </div>

  <div id="mode-normal">
    <label for="role">役割</label>
    <input id="role" placeholder="例：プログラマー、翻訳家、AIオーケストレーター">

    <label for="task">目的</label>
    <input id="task" placeholder="何をしたいですか？">

    <label for="details">詳細（背景・条件など）</label>
    <textarea id="details" rows="5" placeholder="具体的な指示や制約があれば入力"></textarea>

    <label for="tone">トーン</label>
    <select id="tone">
      <option>プロフェッショナル</option>
      <option>丁寧</option>
      <option>カジュアル</option>
      <option>簡潔に</option>
    </select>
  </div>

  <div id="mode-auto" style="display:none;">
    <label for="raw-input">やりたいことを自由に入力（AIに整理させます）</label>
    <textarea id="raw-input" rows="8" placeholder="例：プログラムのバグを直して。JSでボタンが動かない。初心者向けに説明して。"></textarea>

<div class="small">変換モードをクリックすると入力欄に追加されます。</div>
<div id="commandBox" class="command-box"></div>

<div class="small">用途別プリセット</div>
<div id="presetBox" class="preset-box"></div>

    <label for="rough-tone">トーン</label>
    <select id="rough-tone">
      <option>プロフェッショナル</option>
      <option>丁寧</option>
      <option>カジュアル</option>
      <option>簡潔に</option>
    </select>

    <label for="ai-target">AI向け最適化</label>
    <select id="ai-target">
      <option value="">なし</option>
      <option value="chatgpt">ChatGPT</option>
      <option value="claude">Claude</option>
      <option value="gemini">Gemini</option>
      <option value="cursor">Cursor</option>
      <option value="copilot">Copilot</option>
    </select>
    <label for="rough-output-format">出力形式</label>
    <select id="rough-output-format">
      <option value="prompt">通常プロンプト</option>
      <option value="json">JSON</option>
    </select>

  </div>

  <div class="btn-group">
    <button id="main-btn" class="btn-full" onclick="generatePrompt()">⚡ プロンプトを生成する</button>
    <button onclick="copyText()" class="btn-secondary">📋 コピー</button>
    <button onclick="download()" class="btn-secondary">💾 保存</button>
    <button onclick="toggleDark()" class="btn-secondary">🌙 ダークモード</button>
  </div>

  <div class="btn-group">
    <button id="templateBtn" onclick="toggleTemplateManager()">📂 テンプレ管理</button>
    <button id="dangerBtn" onclick="toggleDangerManager()">🚨 危険ワード管理</button>
    <button id="patternBtn" onclick="togglePatternManager()">🧩 NGパターン管理</button>
    <button id="aiPresetBtn" onclick="toggleAiPresetManager()">🤖 AIプリセット管理</button>
    <button onclick="exportTemplates()">📤 テンプレバックアップ</button>
  </div>
  <div class="btn-group">
    <button onclick="importTemplates()">📥 テンプレ復元</button>
    <button onclick="exportAiPresets()">🤖 AI設定バックアップ</button>
    <button onclick="importAiPresets()">🤖 AI設定復元</button>
    <button onclick="clearOutput()" class="btn-secondary">🧹 出力クリア</button>
    <button onclick="clearHistory()" class="btn-secondary">🗑 履歴全削除</button>
    <button onclick="recheckOutput()" class="btn-secondary">🔍 再チェック</button>
    <button onclick="formatJsonOutput()" class="btn-secondary">📦 JSON整形</button>
    <button onclick="testJsonFormat()" class="btn-secondary">🧪 JSONテスト</button>
    <button onclick="reviewPrompt()" class="btn-secondary">🛠 Promptレビュー</button>
    <button onclick="testPromptObject()" class="btn-secondary">🧩 内部JSONテスト</button>

  </div>
  <input type="file" id="fileInput" accept=".json,application/json" style="display:none;">

  <input type="file" id="aiPresetFileInput" accept=".json,application/json" style="display:none;">

  <label>生成結果</label>
  <div id="output">ここに表示</div>

  <div id="warningBox" class="warning-box"></div>
<div id="debugBox" class="warning-box" style="display:none;"></div>

  <div id="template-manager" class="section-box" style="display:none;">
    <h3>テンプレ管理</h3>

    <label for="templateSelect">固定テンプレ / 保存テンプレ</label>
    <select id="templateSelect" onchange="applyTemplateFromSelect()">
      <option value="">テンプレを選択</option>
    </select>

    <div class="small">下の入力欄から新しいテンプレも追加できます。</div>

    <label for="tempName">テンプレ名</label>
    <input id="tempName" placeholder="例：バグ修正用、営業文作成">

    <label for="tempRole">役割</label>
    <input id="tempRole" placeholder="例：シニアエンジニア">

    <label for="tempTask">目的</label>
    <input id="tempTask" placeholder="例：JavaScriptの不具合修正">

    <label for="tempDetails">詳細</label>
    <textarea id="tempDetails" rows="5" placeholder="テンプレの詳細内容"></textarea>

    <label for="tempTone">トーン</label>
    <select id="tempTone">
      <option>プロフェッショナル</option>
      <option>丁寧</option>
      <option>カジュアル</option>
      <option>簡潔に</option>
    </select>

    <button onclick="saveTemplate()" class="btn-full">テンプレ保存</button>

    <h4>保存済みテンプレ一覧</h4>
    <div id="templateList"></div>
  </div>

  <div id="danger-manager" class="section-box" style="display:none;">
    <h3>危険ワード管理</h3>
    <div class="small">単語が含まれていたら警告します。</div>

    <label for="dangerWord">危険ワード</label>
    <input id="dangerWord" placeholder="例：パスワード、住所、電話番号">

    <button onclick="saveDangerWord()" class="btn-full">危険ワード追加</button>

    <h4>固定危険ワード + 追加危険ワード</h4>
    <div id="dangerList"></div>
  </div>

  <div id="pattern-manager" class="section-box" style="display:none;">
    <h3>NGパターン管理</h3>
    <div class="small">形式で検出します。正規表現を追加できます。</div>

    <label for="patternName">パターン名</label>
    <input id="patternName" placeholder="例：社員番号、会員ID">

    <label for="patternRegex">正規表現</label>
    <input id="patternRegex" placeholder="例：\\b[A-Z]{2}\\d{6}\\b">

    <label for="patternFlags">フラグ</label>
    <input id="patternFlags" placeholder="例：g または gi">

    <div class="small">よく分からなければ、まずは g を入れてください。</div>

    <button onclick="savePattern()" class="btn-full">NGパターン追加</button>

    <h4>固定NGパターン + 追加NGパターン</h4>
    <div id="patternList"></div>
  </div>

<div id="ai-preset-manager" class="section-box" style="display:none;">
  <h3>AIプリセット管理</h3>
  <div class="small">AI別の変換方針を編集できます。</div>

  <label for="aiPresetTarget">対象AI</label>
  <select id="aiPresetTarget" onchange="loadAiPresetToEditor()">
    <option value="chatgpt">ChatGPT</option>
    <option value="claude">Claude</option>
    <option value="gemini">Gemini</option>
    <option value="cursor">Cursor</option>
    <option value="copilot">Copilot</option>
  </select>

  <label for="aiPresetName">表示名</label>
  <input id="aiPresetName" placeholder="例：ChatGPT">

  <label for="aiPresetInstruction">変換方針</label>
  <textarea id="aiPresetInstruction" rows="6" placeholder="このAI向けの変換方針を入力"></textarea>

  <div class="btn-group">
    <button onclick="saveAiPresetFromEditor()">保存</button>
    <button onclick="resetAiPreset()">初期値に戻す</button>
  </div>
</div>

<div class="section-box">
  <label>履歴（最新5件）</label>
  <div id="history"></div>
</div>

<script>
const get = (id) => document.getElementById(id);

let currentTab = 1;
let isLoading = false;

const defaultTemplates = [
  {
    name: "AIオーケストレーター",
    role: "AIオーケストレーター",
    task: "ユーザーの質問に対して最適なロールを生成して回答する",
    details: `あなたは「AIオーケストレーター」です。

ユーザーの質問に対して、最適な専門ロール（ジョブ）を自動生成・選定し、そのロールとして回答してください。

【処理手順】
① 質問の意図を分析する
② 必要なロールを3〜5個生成する
③ 各ロールの役割を簡潔に説明する
④ 最適なロールを1つ選び、理由を述べる
⑤ 選ばれたロールとして最終回答を行う

【条件】
・ロールは具体的かつ専門的にする
・最終回答は選ばれたロールになりきる
・無駄な説明は省き、論理的に出力する

【出力形式】
1. 意図分析
2. ロール候補
3. 最適ロールと選定理由
4. 最終回答`,
    tone: "プロフェッショナル"
  }
];

const defaultDangerWords = [
  "パスワード",
  "住所",
  "電話番号",
  "メールアドレス",
  "マイナンバー",
  "クレジットカード",
  "カード番号",
  "暗証番号",
  "口座番号",
  "銀行口座",
  "本人確認書類",
  "運転免許証",
  "保険証",
  "秘密の質問",
  "生年月日"
];

const defaultPatterns = [
  { name: "メールアドレス", regex: "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}", flags: "g" },
  { name: "電話番号", regex: "(?:\\+?\\d{1,3}[-\\s]?)?(?:\\d{2,4}[-\\s]?){2,4}\\d{3,4}", flags: "g" },
  { name: "郵便番号", regex: "\\b\\d{3}-?\\d{4}\\b", flags: "g" },
  { name: "クレジットカード候補", regex: "\\b(?:\\d[ -]*?){13,16}\\b", flags: "g" },
  { name: "マイナンバー候補", regex: "\\b\\d{12}\\b", flags: "g" }
];

const commandDefinitions = {
  tldr: "要点を短く箇条書きでまとめる",
  eli15: "専門用語を減らし、15歳でも理解できる説明にする",
  human: "AIっぽさを減らし、自然な文章にする",
  step: "実行可能な手順に分解する",
  enemy: "弱点・リスク・反論を洗い出す",
  real: "事実・推測・不明点を分けて、根拠重視で回答する",
  gap: "不足情報・確認すべき点を洗い出す",
  sort: "内容をカテゴリ別に整理する",
  priority: "重要度・実装優先度を整理する",
  schema: "JSONスキーマやデータ構造に変換する",
  code: "実装コード案を出す",
  test: "テスト観点を作る",
  prompt: "生成AI向けの高品質プロンプトに再構成する"
};

const presetDefinitions = {
  "要約": ["tldr", "sort"],
  "初心者向け": ["eli15", "step"],
  "設計レビュー": ["enemy", "gap", "priority"],
  "実装支援": ["step", "code", "test"],
  "JSON設計": ["schema", "real", "prompt"]
};

const aiPresetDefinitions = {

  chatgpt: {
    name: "ChatGPT",
    instruction:
      "役割、目的、条件、制約、出力形式、トーンを明確に整理してください。"
  },

  claude: {
    name: "Claude",
    instruction:
      "背景、意図、考慮点、判断理由を自然文中心で整理してください。"
  },

  gemini: {
    name: "Gemini",
    instruction:
      "目的、必要な出力、条件を短く明確に整理してください。"
  },

  cursor: {
    name: "Cursor",
    instruction:
      "目的、問題、期待動作、制約、修正方針を明確に整理してください。"
  },

  copilot: {
    name: "Copilot",
    instruction:
      "Goal、Context、Expected behavior、Constraints を短いコメント形式で整理してください。"
  }

};

function getAiPresets() {
  const saved = loadJson("aiPresets", null);

  if (!saved) {
    return aiPresetDefinitions;
  }

  return {
    ...aiPresetDefinitions,
    ...saved
  };
}

function saveAiPresets(presets) {
  localStorage.setItem("aiPresets", JSON.stringify(presets));
}

function getAiPreset(aiTarget) {
const presets = getAiPresets();
return presets[aiTarget] || presets.chatgpt;
}

function buildPromptObject(raw, tone, commands) {
  const safeRaw = String(raw || "").trim();
  const safeTone = tone || "プロフェッショナル";
  const safeCommands = Array.isArray(commands) ? commands : [];

  return {
    version: "5.6_dev",

    source: {
      input_type: "rough",
      raw_text: safeRaw
    },

    prompt: {
      role: "AIアシスタント",
      purpose: safeRaw,
      background: [],
      conditions: [],
      constraints: [],
      output_format: "目的に合った最適な形式で出力する",
      tone: safeTone,
      additional_instructions: []
    },

    commands: safeCommands.map(cmd => ({
      key: cmd,
      instruction: commandDefinitions[cmd] || ""
    })),

    assumptions: [],
    missing_information: [],

    metadata: {
      created_at: new Date().toISOString(),
      app_name: "AIプロンプト生成Pro",
      app_version: "v5.6_dev"
    }
  };
}
function convertForAI(obj, aiTarget, outputFormat) {
  if (outputFormat === "json") {
    return JSON.stringify(obj, null, 2);
  }

  obj.ai_preset = getAiPreset(aiTarget);

  switch (aiTarget) {
    case "chatgpt":
      return convertForChatGPT(obj);

    case "claude":
      return convertForClaude(obj);

    case "gemini":
      return convertForGemini(obj);

    case "cursor":
      return convertForCursor(obj);

    case "copilot":
      return convertForCopilot(obj);

    default:
      return convertForChatGPT(obj);
  }
}

function convertForChatGPT(obj) {

  const preset = obj.ai_preset || {};

  return `以下の「やりたいこと」を分析し、プロンプトの各項目に整理して再構成してください。

${preset.instruction || ""}

【やりたいこと】
${obj.prompt.purpose}

${buildCommandInstructionsFromObject(obj)}

---
出力は以下の形式で整理してください：
役割：
目的：
背景・条件：
出力形式：
トーン：${obj.prompt.tone}`;
}

function convertForClaude(obj) {

  const preset = obj.ai_preset || {};

  return `背景：
${obj.prompt.purpose}

${preset.instruction || ""}

意図：
この依頼で達成したいことを整理してください。

考慮点：
前提、制約、不明点、判断理由を丁寧に整理してください。

${buildCommandInstructionsFromObject(obj)}

期待する出力：
読みやすく、自然文中心で、必要に応じて箇条書きで回答してください。

トーン：
${obj.prompt.tone}`;
}

function convertForGemini(obj) {

  const preset = obj.ai_preset || {};

  return `目的：
${obj.prompt.purpose}

${preset.instruction || ""}

必要な出力：
要点を短く整理し、実行しやすい形で回答してください。

条件：
- 簡潔に
- 重要点を優先
- 必要に応じて箇条書き

${buildCommandInstructionsFromObject(obj)}

トーン：
${obj.prompt.tone}`;
}

function convertForCursor(obj) {

  const preset = obj.ai_preset || {};

  return `目的:
${obj.prompt.purpose}

${preset.instruction || ""}

現状:
現在のコードや動作状況を整理してください。

問題:
発生している不具合・課題・原因候補を整理してください。

期待動作:
修正後にどう動くべきかを明確にしてください。

制約:
既存UI・既存機能を壊さないでください。

${buildCommandInstructionsFromObject(obj)}

出力:
1. 原因
2. 修正方針
3. 修正コード
4. 確認方法`;
}

function convertForCopilot(obj) {

  const preset = obj.ai_preset || {};

  return `// Goal:
${obj.prompt.purpose}

${preset.instruction || ""}

// Context:
// 現在の状況・背景・関連コードの前提を整理してください。

// Expected behavior:
// 期待する動作・完成状態を整理してください。

// Constraints:

function parseCommands(text) {
  const commandKeys = Object.keys(commandDefinitions);
  const found = [];

  const matches = text.match(/\/[a-zA-Z0-9]+/g) || [];

  matches.forEach(m => {
    const cmd = m.replace("/", "").toLowerCase();
    if (commandKeys.includes(cmd)) {
      found.push(cmd);
    }
  });

  const cleaned = text.replace(/\/[a-zA-Z0-9]+/g, "").trim();

  return {
    cleanedText: cleaned,
    commands: [...new Set(found)]
  };
}

function buildCommandInstructions(commands) {
  if (!commands || commands.length === 0) return "";

  const lines = commands.map(cmd => {
    return `・${cmd}: ${commandDefinitions[cmd]}`;
  });

  return `
# 追加変換モード
以下の変換モードを反映してください。
${lines.join("\n")}
`;
}

function buildCommandInstructionsFromObject(obj) {
  if (!obj.commands || obj.commands.length === 0) return "";

  const lines = obj.commands.map(cmd => {
    return `・${cmd.key}: ${cmd.instruction}`;
  });

  return `
# 追加変換モード
以下の変換モードを反映してください。
${lines.join("\n")}
`;
}

function applyPreset(commands) {

  const input = get("raw-input");

  // 既存コマンド削除
  let text = input.value.replace(/\/[a-zA-Z0-9]+/g, "").trim();

  // プリセット追加
  const commandText = commands.map(c => `/${c}`).join(" ");

  input.value = `${text} ${commandText}`.trim();

  syncCommandButtons();
  saveCurrentState();
  input.focus();
}

function addCommand(cmd) {
  const input = get("raw-input");
  let current = input.value;

  const commandText = `/${cmd}`;
  const commands = current.match(/\/[a-zA-Z0-9]+/g) || [];
  const exists = commands.includes(commandText);

  if (exists) {
    current = current
      .split(/\s+/)
      .filter(part => part !== commandText)
      .join(" ")
      .trim();
  } else {
    current = `${current.trim()} ${commandText}`.trim();
  }

  input.value = current;
  syncCommandButtons();
  saveCurrentState();
  input.focus();
}

function syncCommandButtons() {
  const input = get("raw-input");
  const text = input.value;
  const commands = text.match(/\/[a-zA-Z0-9]+/g) || [];

  document.querySelectorAll(".command-chip").forEach(btn => {
    const cmd = btn.dataset.cmd;
    btn.classList.toggle("active", commands.includes(`/${cmd}`));
  });
}

function generatePrompt() {
  let p = "";

  if (currentTab === 1) {
    const role = get("role").value.trim() || "AIアシスタント";
    const task = get("task").value.trim();
    const details = get("details").value.trim();
    const tone = get("tone").value;

    if (!task) {
      alert("目的を入力してください");
      return;
    }

    p = `あなたは「${role}」として振る舞ってください。

# 目的
${task}
`;

    if (details) {
      p += `
# 詳細・条件
${details}
`;
    }

    p += `
# トーン
${tone}

上記に基づき、具体的かつ最適な回答を出力してください。`;

  } else {
    const rawOriginal = get("raw-input").value.trim();
    const tone = get("rough-tone").value;
    const outputFormat = get("rough-output-format").value;
    const aiTarget = get("ai-target").value || "chatgpt";

    const parsed = parseCommands(rawOriginal);
    const raw = parsed.cleanedText;

    if (!raw) {
      alert("内容を入力してください");
      return;
    }

    const obj = buildPromptObject(
      raw,
      tone,
      parsed.commands
    );

    p = convertForAI(
      obj,
      aiTarget,
      outputFormat
    );
  }

  get("output").innerText = p;
  saveHistory(p);
  checkSensitiveContent(p);
  saveCurrentState();
}

function copyText() {
  const text = get("output").innerText.trim();
  if (!text || text === "ここに表示") {
    alert("先に生成してください");
    return;
  }

  const report = detectSensitiveContent(text);
  if (report.hasAny) {
    const ok = confirm(buildConfirmMessage(report, "コピー"));
    if (!ok) return;
  }

  navigator.clipboard.writeText(text)
    .then(() => alert("コピー完了"))
    .catch(() => alert("コピー失敗（長押しコピーしてください）"));
}

function download() {
  const text = get("output").innerText.trim();
  if (!text || text === "ここに表示") {
    alert("先に生成してください");
    return;
  }

  const report = detectSensitiveContent(text);
  if (report.hasAny) {
    const ok = confirm(buildConfirmMessage(report, "保存"));
    if (!ok) return;

  const blob = new Blob([text], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "prompt.txt";
  a.click();
}

function formatJsonOutput() {
  const output = get("output");
  let text = output.innerText.trim();

  if (!text || text === "ここに表示") {
    alert("JSONがありません");
    return;
  }

  try {

    // ```json 除去
    text = text
      .replace(/```json/g, "")
      .replace(/```/g, "")
      .trim();

    // JSON化
    const parsed = JSON.parse(text);

    // 整形
    const formatted = JSON.stringify(parsed, null, 2);

    output.innerText = formatted;

    alert("JSON整形完了");

  } catch (e) {

    alert("JSON形式が不正です\n\n" + e.message);

  }
}

function reviewPrompt() {
  const text = get("output").innerText.trim();

  if (!text || text === "ここに表示") {
    alert("先に生成してください");
    return;
  }

  let score = 100;

  const goodPoints = [];
  const warnings = [];
  const suggestions = [];

  const hasJsonLike = text.startsWith("{") || text.startsWith("[");
  let parsedJson = null;

  if (hasJsonLike) {
    try {
      parsedJson = JSON.parse(text);
      goodPoints.push("JSONとして解析可能");
    } catch (e) {
      score -= 25;
      warnings.push("JSON形式が不正です");
      suggestions.push("JSON整形ボタンで確認し、余計な説明文やMarkdownを除去してください。");
    }
  }

  const checks = [
    {
      name: "役割",
      ok: text.includes("役割") || text.includes('"role"'),
      penalty: 12,
      warning: "役割が不明です",
      suggestion: "誰として回答するかを明記してください。例：あなたはHTML/JavaScriptに詳しい設計者です。"
    },
    {
      name: "目的",
      ok: text.includes("目的") || text.includes('"purpose"') || text.includes("Goal"),
      penalty: 12,
      warning: "目的が不明です",
      suggestion: "何を達成したいのかを1文で明記してください。"
    },
    {
      name: "背景・条件",
      ok: text.includes("背景") || text.includes("条件") || text.includes('"conditions"') || text.includes("Context"),
      penalty: 10,
      warning: "背景・条件が不足しています",
      suggestion: "前提、対象範囲、現在の状況を追加してください。"
    },
    {
      name: "制約",
      ok: text.includes("制約") || text.includes("禁止") || text.includes("注意") || text.includes('"constraints"'),
      penalty: 10,
      warning: "制約・禁止事項が不足しています",
      suggestion: "既存仕様を壊さない、API直送しない、出力形式を守るなどを追加してください。"
    },
    {
      name: "出力形式",
      ok: text.includes("出力形式") || text.includes('"output_format"') || text.includes("Output"),
      penalty: 12,
      warning: "出力形式が曖昧です",
      suggestion: "箇条書き、表、JSON、修正コードなど、期待する出力形式を指定してください。"
    },
    {
      name: "トーン",
      ok: text.includes("トーン") || text.includes('"tone"'),
      penalty: 8,
      warning: "トーン指定がありません",
      suggestion: "プロフェッショナル、簡潔、初心者向けなどの文体を指定してください。"
    },
    {
      name: "不足情報",
      ok: text.includes("不足") || text.includes("確認") || text.includes('"missing_information"'),
      penalty: 8,
      warning: "不足情報への対応指示がありません",
      suggestion: "不明点がある場合は、確認するか仮定として明示する指示を追加してください。"
    },
    {
      name: "追加指示",
      ok: text.includes("追加変換モード") || text.includes('"commands"'),
      penalty: 5,
      warning: "追加指示・コマンドが反映されていません",
      suggestion: "必要に応じて /step /enemy /schema などを追加してください。"
    }
  ];

  checks.forEach(check => {
    if (check.ok) {
      goodPoints.push(`${check.name}あり`);
    } else {
      score -= check.penalty;
      warnings.push(check.warning);
      suggestions.push(check.suggestion);
    }
  });

  const vagueWords = ["いい感じ", "なんとか", "適当に", "わかりやすく", "詳しく"];
  const foundVague = vagueWords.filter(word => text.includes(word));

  if (foundVague.length > 0) {
    score -= 10;
    warnings.push(`曖昧な表現があります：${foundVague.join("、")}`);
    suggestions.push("曖昧語を、具体的な完了条件・対象範囲・評価基準に置き換えてください。");
  }

  if (text.length < 120) {
    score -= 10;
    warnings.push("内容が短く、情報不足の可能性があります");
    suggestions.push("背景、目的、条件、期待する完成形を追加してください。");
  } else {
    goodPoints.push("一定の情報量あり");
  }

  if (parsedJson) {
    if (parsedJson.version) goodPoints.push("バージョン情報あり");
    if (parsedJson.prompt && parsedJson.prompt.purpose) goodPoints.push("内部JSONの目的あり");
    if (Array.isArray(parsedJson.commands)) goodPoints.push("commands配列あり");

    if (!parsedJson.prompt) {
      score -= 10;
      warnings.push("内部JSONに prompt オブジェクトがありません");
      suggestions.push("buildPromptObject() の構造を確認してください。");
    }
  }

  score = Math.max(0, Math.min(100, score));

  let rank = "C";
  if (score >= 90) rank = "S";
  else if (score >= 80) rank = "A";
  else if (score >= 65) rank = "B";

  let result = `Prompt Score : ${score} / 100\nRank : ${rank}\n\n`;

  if (goodPoints.length > 0) {
    result += "良い点:\n";
    result += [...new Set(goodPoints)].map(x => `✔ ${x}`).join("\n");
    result += "\n\n";
  }

  if (warnings.length > 0) {
    result += "改善候補:\n";
    result += [...new Set(warnings)].map(x => `⚠ ${x}`).join("\n");
    result += "\n\n";
  }

  if (suggestions.length > 0) {
    result += "改善案:\n";
    result += [...new Set(suggestions)].map(x => `・${x}`).join("\n");
  } else {
    result += "大きな改善点は見つかりません。";
  }

  alert(result);
}

function saveHistory(text) {
  let h = loadJson("h", []);
  h.unshift(text);
  h = h.slice(0, 5);
  localStorage.setItem("h", JSON.stringify(h));
  renderHistory();
}

  const h = loadJson("h", []);
  get("history").innerHTML = h.map((x, i) => `
    <div class="history">
      ${escapeHtml(x.substring(0, 80))}...
      <div class="history-actions">
        <button onclick='reuseHistory(${JSON.stringify(x)})'>再利用</button>
        <button onclick='saveFromHistory(${JSON.stringify(x)})'>テンプレ化</button>

  const details = get("tempDetails").value.trim();
  const tone = get("tempTone").value;

  switchTab(1);

  get("task").value = t.task || "";

function saveFromHistory(text) {
  const name = prompt("テンプレ名を入力してください");
  if (!name) return;

  const roleMatch = text.match(/あなたは「(.+?)」/);
  const taskMatch = text.match(/# 目的\n([\s\S]*?)(\n#|\n$|$)/);

  let list = loadJson("templates", []);
  list.push({
    name,
    role: roleMatch ? roleMatch[1] : "",
    task: taskMatch ? taskMatch[1].trim() : "",
    details: text,
    tone: "プロフェッショナル"
  });

  localStorage.setItem("templates", JSON.stringify(list));
  alert("テンプレ化しました");
  renderTemplates();
  renderTemplateSelect();
}

get("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!Array.isArray(parsed)) {
        alert("テンプレファイルの形式が正しくありません");
        return;
      }
      localStorage.setItem("templates", JSON.stringify(parsed));
      renderTemplates();
      renderTemplateSelect();
      alert("復元完了");
    } catch {
      alert("読み込みに失敗しました");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

get("aiPresetFileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);

      if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
        alert("AIプリセットファイルの形式が正しくありません");
        return;
      }

      const validKeys = ["chatgpt", "claude", "gemini", "cursor", "copilot"];

      for (const key of Object.keys(parsed)) {
        if (!validKeys.includes(key)) {
          alert(`不明なAI設定が含まれています: ${key}`);
          return;
        }

        if (
          !parsed[key] ||
          typeof parsed[key].name !== "string" ||
          typeof parsed[key].instruction !== "string"
        ) {
          alert(`AI設定の形式が正しくありません: ${key}`);
          return;
        }
      }

      saveAiPresets(parsed);

      if (get("ai-preset-manager").style.display !== "none") {
        loadAiPresetToEditor();
      }

      alert("AIプリセットを復元しました");

    } catch (e) {
      alert("AIプリセットの読み込みに失敗しました\n\n" + e.message);
    }
  };

  reader.readAsText(file);
  e.target.value = "";
});

function saveDangerWord() {
  const word = get("dangerWord").value.trim();
  if (!word) {
    alert("危険ワードを入力してください");
    return;
  }

  let list = JSON.parse(localStorage.getItem("dangerWords") || "[]");
  if (defaultDangerWords.includes(word) || list.includes(word)) {
    alert("すでに登録されています");
    return;
  }

  list.push(word);
  localStorage.setItem("dangerWords", JSON.stringify(list));
  get("dangerWord").value = "";
  renderDangerWords();
}

function renderDangerWords() {
  const local = loadJson("dangerWords", []);
  const all = [...defaultDangerWords, ...local];

  get("dangerList").innerHTML = all.map((word, i) => `
    <div class="danger-item">
      <b>${escapeHtml(word)}</b>
      <div class="item-actions">
        ${
          i >= defaultDangerWords.length
            ? `<button onclick="deleteDangerWord(${i - defaultDangerWords.length})">削除</button>`
            : `<span class="small">固定ワード</span>`
        }
      </div>
    </div>
  `).join("");
}

function deleteDangerWord(index) {
  let list = loadJson("dangerWords", []);
  list.splice(index, 1);
  localStorage.setItem("dangerWords", JSON.stringify(list));
  renderDangerWords();
}

function getAllDangerWords() {
  const local = loadJson("dangerWords", []);
  return [...defaultDangerWords, ...local];
}

function savePattern() {
  const name = get("patternName").value.trim();
  const regex = get("patternRegex").value.trim();
  const flags = get("patternFlags").value.trim() || "g";

  if (!name || !regex) {
    alert("パターン名と正規表現を入力してください");
    return;
  }

  try {
    new RegExp(regex, flags);
  } catch {
    alert("正規表現が正しくありません");
    return;
  }

  let list = JSON.parse(localStorage.getItem("dangerPatterns") || "[]");
  list.push({ name, regex, flags });
  localStorage.setItem("dangerPatterns", JSON.stringify(list));

  get("patternName").value = "";
  get("patternRegex").value = "";
  get("patternFlags").value = "";

  alert("NGパターンを追加しました");
  renderPatterns();
}

function renderPatterns() {
  const local = loadJson("dangerPatterns", []);
  const all = [...defaultPatterns, ...local];

  get("patternList").innerHTML = all.map((p, i) => `
    <div class="pattern-item">
      <b>${escapeHtml(p.name)}</b>
      <div class="code-like">/${escapeHtml(p.regex)}/${escapeHtml(p.flags || "")}</div>
      <div class="item-actions">
        ${
          i >= defaultPatterns.length
            ? `<button onclick="deletePattern(${i - defaultPatterns.length})">削除</button>`
            : `<span class="small">固定パターン</span>`
        }
      </div>
    </div>
  `).join("");
}

function deletePattern(index) {
  let list = loadJson("dangerPatterns", []);
  list.splice(index, 1);
  localStorage.setItem("dangerPatterns", JSON.stringify(list));
  renderPatterns();
}

function getAllPatterns() {
  const local = loadJson("dangerPatterns", []);
  return [...defaultPatterns, ...local];
}

function detectSensitiveContent(text) {
  const source = String(text || "");
  const foundWords = getAllDangerWords().filter(word => word && source.includes(word));

  const foundPatterns = [];
  for (const p of getAllPatterns()) {
    try {
      const regex = new RegExp(p.regex, p.flags || "g");
      const matches = source.match(regex);
      if (matches && matches.length > 0) {
        foundPatterns.push({
          name: p.name,
          count: matches.length,
          samples: [...new Set(matches)].slice(0, 3)
        });
      }
    } catch {}
  }

  return {
    hasAny: foundWords.length > 0 || foundPatterns.length > 0,
    foundWords,
    foundPatterns
  };
}

function checkSensitiveContent(text) {
  const report = detectSensitiveContent(text);

  if (!report.hasAny) {
    hideWarning();
    return;
  }

  const lines = [];
  lines.push("警告：個人情報・認証情報が含まれている可能性があります。");
  lines.push("");

  if (report.foundWords.length > 0) {
    lines.push("【危険ワード】");
    lines.push(report.foundWords.join("、"));
    lines.push("");
  }

  if (report.foundPatterns.length > 0) {
    lines.push("【NGパターン検出】");
    report.foundPatterns.forEach(item => {
      const sampleText = item.samples.length > 0 ? ` 例: ${item.samples.join(" / ")}` : "";
      lines.push(`・${item.name}（${item.count}件）${sampleText}`);
    });
    lines.push("");
  }

  lines.push("外部に送る前に、本当に問題ないか確認してください。");

  get("warningBox").style.display = "block";
  get("warningBox").innerText = lines.join("\n");
}

function buildConfirmMessage(report, actionName) {
  const lines = [];
  lines.push(`警告：${actionName}前に確認してください。`);
  lines.push("");

  if (report.foundWords.length > 0) {
    lines.push("【危険ワード】");
    lines.push(report.foundWords.join("、"));
    lines.push("");
  }

  if (report.foundPatterns.length > 0) {
    lines.push("【NGパターン検出】");
    report.foundPatterns.forEach(item => {
      const sampleText = item.samples.length > 0 ? ` 例: ${item.samples.join(" / ")}` : "";
      lines.push(`・${item.name}（${item.count}件）${sampleText}`);
    });
    lines.push("");
  }

  lines.push(`それでも${actionName}しますか？`);
  return lines.join("\n");
}

function hideWarning() {
  get("warningBox").style.display = "none";
  get("warningBox").innerText = "";
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function loadJson(key, fallback) {
  try {
    return JSON.parse(
      localStorage.getItem(key) || JSON.stringify(fallback)
    );
  } catch {
    localStorage.removeItem(key);
    return fallback;
  }
}

function saveCurrentState() {
  if (isLoading) return;
  if (!get("raw-input")) return;

  localStorage.setItem("rawInput", get("raw-input").value);
  localStorage.setItem("roughTone", get("rough-tone").value);
  localStorage.setItem("roughOutputFormat", get("rough-output-format").value);
  localStorage.setItem("roleValue", get("role").value);
  localStorage.setItem("taskValue", get("task").value);
  localStorage.setItem("detailsValue", get("details").value);
  localStorage.setItem("toneValue", get("tone").value);
  localStorage.setItem("currentTab", String(currentTab));
  localStorage.setItem("aiTarget", get("ai-target").value);
}


function loadSettings() {
  isLoading = true;

  if (localStorage.getItem("darkMode") === "1") {
    document.body.classList.add("dark");
  }

  closeAllManagers();
  renderHistory();
  renderTemplates();
  renderTemplateSelect();
  renderDangerWords();
  renderPatterns();
  renderCommandChips();
  renderPresetChips();

  get("raw-input").value = localStorage.getItem("rawInput") || "";
  get("rough-tone").value = localStorage.getItem("roughTone") || "プロフェッショナル";
  get("rough-output-format").value = localStorage.getItem("roughOutputFormat") || "prompt";
  get("role").value = localStorage.getItem("roleValue") || "";
  get("task").value = localStorage.getItem("taskValue") || "";
  get("details").value = localStorage.getItem("detailsValue") || "";
  get("tone").value = localStorage.getItem("toneValue") || "プロフェッショナル";
  get("ai-target").value = localStorage.getItem("aiTarget") || "chatgpt";

  const savedTab = Number(localStorage.getItem("currentTab") || "1");
  currentTab = savedTab;
  switchTab(savedTab);

  syncCommandButtons();
  updatePanelButtonStates();

  isLoading = false;
}

window.onerror = function(message, source, line, col, error) {
  const box = get("debugBox");
  if (!box) return;

  box.style.display = "block";
  box.innerText =
`JS Error

message:
${message}

line:
${line}

column:
${col}`;
};

document.addEventListener("DOMContentLoaded", loadSettings);
document.addEventListener("input", saveCurrentState);
document.addEventListener("change", saveCurrentState);
</script>
